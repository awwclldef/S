name: Scratch Ranking Update

on:
  schedule:
    # 毎日 日本時間 0:00, 4:00, 12:00, 20:00 に自動実行
    # (UTC設定: 15:00, 19:00, 3:00, 11:00)
    - cron: '0 15,19,3,11 * * *'
  workflow_dispatch: # ボタンから手動で実行できるようにする設定

jobs:
  build:
    runs-on: ubuntu-latest
    # リポジトリへの書き込み権限を与える
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach

      - name: Run script
        env:
          # GitHubのSettings > Secretsで登録した値を使用
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ranking: $(date)" && git push)

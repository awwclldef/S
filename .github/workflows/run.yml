name: Scratch Ranking Update

on:
  schedule:
    # 毎日 日本時間 0:00 / 4:00 / 12:00 / 20:00 に実行する場合
    # (UTCなので9時間引いて設定します)
    - cron: '0 15,19,3,11 * * *'
  workflow_dispatch: # 手動で実行ボタンを押せるようにする設定

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach

      - name: Run script
        env:
          # ここでGitHubのSecretsをプログラムに渡す
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        run: python your_filename.py  # ←ここにPythonのファイル名を入れてください

      - name: Commit and push HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update ranking HTML" || exit 0
          git push
